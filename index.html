<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026-2027</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    margin: 0;
    padding: 40px 20px;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    background: #ffffff;
    color: #0f172a;
    min-height: 100vh;
}

h1 {
    text-align: center;
    color: #0f172a;
    font-size: 2.4rem;
    margin-bottom: 5px;
    font-weight: 800;
    letter-spacing: -0.5px;
}

h2 {
    text-align: center;
    color: #475569;
    font-size: 1.4rem;
    margin-top: 0;
    font-weight: 500;
}

h3 {
    text-align: center;
    color: #64748b;
    font-size: 1.1rem;
    margin-bottom: 45px;
}

.cards-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 25px;
    max-width: 1300px;
    margin: 0 auto;
}

/* Thrilling Cyber-Liquid Glass Design */
.card {
    min-height: 100px;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
    border: 1px solid rgba(255, 255, 255, 0.3);
    
    /* Extreme backdrop saturation to amplify underlying layers */
    backdrop-filter: blur(30px) saturate(210%);
    -webkit-backdrop-filter: blur(30px) saturate(210%);
    
    /* Complex multi-layered inner reflections creating that wet, hyper-realistic liquid look */
    box-shadow: 
        inset 0 4px 6px rgba(255, 255, 255, 0.6),
        inset 0 25px 30px rgba(255, 255, 255, 0.3), 
        inset 0 -15px 25px rgba(0, 0, 0, 0.2), 
        0 12px 24px var(--vibrant-shadow);
    
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Hyper-Gloss Highlight curve across the top half */
.card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 50%;
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 100%);
    border-radius: 22px 22px 60% 60%;
    pointer-events: none;
}

/* Micro-thin glowing outer edge bevel */
.card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    padding: 2px;
    background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.1) 50%, rgba(0,0,0,0.2));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}

/* Vivid, glowing vector icons */
.card i {
    font-size: 26px;
    margin-bottom: 10px;
    color: #ffffff;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)) drop-shadow(0 0 10px rgba(255,255,255,0.6));
    transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

.card span {
    letter-spacing: 0.4px;
    text-shadow: 0 2px 5px rgba(0, 0, 0, 0.35);
}

/* Thrilling Pop Hover States */
.card:hover {
    transform: translateY(-10px) scale(1.04);
    box-shadow: 
        inset 0 4px 8px rgba(255, 255, 255, 0.8),
        inset 0 30px 35px rgba(255, 255, 255, 0.4), 
        inset 0 -10px 20px rgba(0, 0, 0, 0.15), 
        0 20px 35px var(--vibrant-shadow-hover);
    filter: brightness(1.05);
}

.card:hover i {
    transform: scale(1.2) rotate(-3deg);
}
</style>
</head>

<body>

<h1>Mahatma Gandhi Institute of Technology</h1>
<h2>Training and Placement Cell</h2>
<h3>Academic Year 2026-2027</h3>

<div class="cards-container" id="cardsContainer"></div>

<script>
const csvLinks = {
    A:"https://docs.google.com/spreadsheets/d/e/2PACX-1vT4Yx068ZzCU8j4ouN_73-tolfsyoAO0skZWsGSc_4oZbACSlNGtpBCfaGQkpZfWg/pub?gid=1507961296&single=true&output=csv",
    B:"", C:"", D:"", E:"", F:"", G:"", H:"", I:"", J:"", K:"", L:"", M:"", N:"", O:"", P:"", Q:"", R:""
};

/* Eye-thrilling, ultra-saturated liquid gradient palettes.
  Each card gets high-intensity color values + an matching colorful ambient drop shadow.
*/
const vibrantThemes = [
    { bg: "linear-gradient(135deg, #0052d4, #4364f7, #6fb1fc)", shadow: "rgba(67, 100, 247, 0.4)", hover: "rgba(67, 100, 247, 0.6)" },      // A - Electric Blue
    { bg: "linear-gradient(135deg, #7f00ff, #e100ff)",         shadow: "rgba(225, 0, 255, 0.35)", hover: "rgba(225, 0, 255, 0.55)" },     // B - Cyber Purple
    { bg: "linear-gradient(135deg, #ff007f, #ff4500)",         shadow: "rgba(255, 0, 127, 0.4)", hover: "rgba(255, 0, 127, 0.6)" },      // C - Hot Neon Pink/Red
    { bg: "linear-gradient(135deg, #00b4db, #0083b0)",         shadow: "rgba(0, 180, 219, 0.4)", hover: "rgba(0, 180, 219, 0.6)" },      // D - Vivid Cyan
    { bg: "linear-gradient(135deg, #f857a6, #ff5858)",         shadow: "rgba(248, 87, 166, 0.4)", hover: "rgba(248, 87, 166, 0.6)" },     // E - Capgemini Neon Pink
    { bg: "linear-gradient(135deg, #00c6ff, #0072ff)",         shadow: "rgba(0, 114, 255, 0.4)", hover: "rgba(0, 114, 255, 0.6)" },      // F - Cognizant Electric Blue
    { bg: "linear-gradient(135deg, #11998e, #38ef7d)",         shadow: "rgba(56, 239, 125, 0.35)", hover: "rgba(56, 239, 125, 0.55)" },   // G - Toxic Alien Green
    { bg: "linear-gradient(135deg, #4e54c8, #8f94fb)",         shadow: "rgba(78, 84, 200, 0.4)", hover: "rgba(78, 84, 200, 0.6)" },      // H - IBM Deep Neon Indigo
    { bg: "linear-gradient(135deg, #ff9900, #ff5500)",         shadow: "rgba(255, 85, 0, 0.4)", hover: "rgba(255, 85, 0, 0.6)" },        // I - Tech Mahindra Fire Orange
    { bg: "linear-gradient(135deg, #3a1c71, #d76d77, #ffaf7b)", shadow: "rgba(215, 109, 119, 0.4)", hover: "rgba(215, 109, 119, 0.6)" },   // J - Cosmic Sunset
    { bg: "linear-gradient(135deg, #ef32d9, #89fffd)",         shadow: "rgba(239, 50, 217, 0.35)", hover: "rgba(239, 50, 217, 0.55)" },   // K - Synthwave Magenta
    { bg: "linear-gradient(135deg, #1d976c, #93f9b9)",         shadow: "rgba(29, 151, 108, 0.35)", hover: "rgba(29, 151, 108, 0.55)" },   // L - Amazon Emerald
    { bg: "linear-gradient(135deg, #ff416c, #ff4b2b)",         shadow: "rgba(255, 65, 108, 0.4)", hover: "rgba(255, 65, 108, 0.6)" },     // M - Google Intense Red
    { bg: "linear-gradient(135deg, #2193b0, #6dd5ed)",         shadow: "rgba(33, 147, 176, 0.4)", hover: "rgba(33, 147, 176, 0.6)" },     // N - Microsoft Sky Blue
    { bg: "linear-gradient(135deg, #654ea3, #eaafc8)",         shadow: "rgba(101, 78, 163, 0.4)", hover: "rgba(101, 78, 163, 0.6)" },     // O - Premium Orchid
    { bg: "linear-gradient(135deg, #ffe259, #ffa751)",         shadow: "rgba(255, 167, 81, 0.4)", hover: "rgba(255, 167, 81, 0.6)" },     // P - Electric Gold
    { bg: "linear-gradient(135deg, #4ac1ff, #7957ff)",         shadow: "rgba(121, 87, 255, 0.4)", hover: "rgba(121, 87, 255, 0.6)" },     // Q - Hexaware Neon Violet
    { bg: "linear-gradient(135deg, #000000, #434343)",         shadow: "rgba(0, 0, 0, 0.2)", hover: "rgba(0, 0, 0, 0.35)" }               // R - Luxury Liquid Obsidian
];

const cardNames = {
    A:"Total Students Data", B:"HR Contact Details", C:"Training Programs",
    D:"Placed Data with Offers", E:"Capgemini", F:"Cognizant",
    G:"Enrollment Journey", H:"IBM", I:"Tech Mahindra",
    J:"HCL", K:"Oracle", L:"Amazon",
    M:"Google", N:"Microsoft", O:"KPIT",
    P:"Zoho", Q:"Hexaware", R:"Genpact"
};

const cardIcons = {
    A: '<i class="fa-solid fa-users"></i>', B: '<i class="fa-solid fa-address-book"></i>', C: '<i class="fa-solid fa-graduation-cap"></i>',
    D: '<i class="fa-solid fa-file-signature"></i>', E: '<i class="fa-solid fa-laptop-code"></i>', F: '<i class="fa-solid fa-network-wired"></i>',
    G: '<i class="fa-solid fa-route"></i>', H: '<i class="fa-solid fa-server"></i>', I: '<i class="fa-solid fa-gears"></i>',
    J: '<i class="fa-solid fa-terminal"></i>', K: '<i class="fa-solid fa-database"></i>', L: '<i class="fa-brands fa-amazon"></i>',
    M: '<i class="fa-brands fa-google"></i>', N: '<i class="fa-brands fa-microsoft"></i>', O: '<i class="fa-solid fa-car-battery"></i>',
    P: '<i class="fa-solid fa-box-open"></i>', Q: '<i class="fa-solid fa-cubes"></i>', R: '<i class="fa-solid fa-chart-line"></i>'
};

const container = document.getElementById("cardsContainer");

Object.keys(csvLinks).forEach((key, index) => {
    const card = document.createElement("div");
    card.className = "card";
    
    const theme = vibrantThemes[index];
    card.style.background = theme.bg;
    card.style.setProperty('--vibrant-shadow', theme.shadow);
    card.style.setProperty('--vibrant-shadow-hover', theme.hover);

    card.innerHTML = `${cardIcons[key]} <span>${cardNames[key]}</span>`;

    card.onclick = () => {
        if(key === "A"){
            localStorage.setItem("csvURL", csvLinks[key]);
            window.location.href = "2027-Total_Students_Data.html";
        }
        else if(key === "B"){ window.location.href = "HR_Contact_Details.html"; }
        else if(key === "C"){ window.location.href = "wipro.html"; }
        else if(key === "D"){ window.location.href = "Placed_Students_Data.html"; }
        else if(key === "E"){ window.location.href = "capgemini.html"; }
        else if(key === "F"){ window.location.href = "cognizant.html"; }
        else if(key === "G"){ window.location.href = "2027-Student_Enrollment_&_Selection_Journey.html"; }
        else if(key === "H"){ window.location.href = "ibm.html"; }
        else if(key === "I"){ window.location.href = "techmahindra.html"; }
        else if(key === "J"){ window.location.href = "hcl.html"; }
        else if(key === "K"){ window.location.href = "oracle.html"; }
        else if(key === "L"){ window.location.href = "amazon.html"; }
        else if(key === "M"){ window.location.href = "google.html"; }
        else if(key === "N"){ window.location.href = "microsoft.html"; }
        else if(key === "O"){ window.location.href = "kpit.html"; }
        else if(key === "P"){ window.location.href = "zoho.html"; }
        else if(key === "Q"){ window.location.href = "hexaware.html"; }
        else if(key === "R"){ window.location.href = "genpact.html"; }
    };

    container.appendChild(card);
});
</script>

</body>
</html>
