<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026-2027</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    margin: 0;
    padding: 30px 20px;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #1e293b;
    min-height: 100vh;
}

h1 {
    text-align: center;
    color: #0f172a;
    font-size: 2rem;
    margin-bottom: 5px;
    font-weight: 700;
    letter-spacing: -0.5px;
}

h2 {
    text-align: center;
    color: #475569;
    font-size: 1.2rem;
    margin-top: 0;
    font-weight: 400;
}

h3 {
    text-align: center;
    color: #64748b;
    font-size: 0.95rem;
    margin-bottom: 35px;
}

/* Shrunk the card widths by forcing more columns in the same space */
.cards-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    max-width: 1100px;
    margin: 0 auto;
}

/* Compact Corporate Card Styling */
.card {
    height: 64px; /* Strictly decreased height */
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    padding: 6px 12px;
    position: relative;
    box-sizing: border-box;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    
    /* Clean solid gradient depth */
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
}

/* Micro compact spacing for icons */
.card i {
    font-size: 16px;
    margin-bottom: 4px;
    opacity: 0.95;
}

.card span {
    letter-spacing: 0.2px;
    line-height: 1.2;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

/* Micro-interactions */
.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    filter: saturate(1.1) brightness(1.02);
}
</style>
</head>

<body>

<h1>Mahatma Gandhi Institute of Technology</h1>
<h2>Training and Placement Cell</h2>
<h3>Academic Year 2026-2027</h3>

<div class="cards-container" id="cardsContainer"></div>

<script>
const csvLinks = {
    A:"https://docs.google.com/spreadsheets/d/e/2PACX-1vT4Yx068ZzCU8j4ouN_73-tolfsyoAO0skZWsGSc_4oZbACSlNGtpBCfaGQkpZfWg/pub?gid=1507961296&single=true&output=csv",
    B:"", C:"", D:"", E:"", F:"", G:"", H:"", I:"", J:"", K:"", L:"", M:"", N:"", O:"", P:"", Q:"", R:""
};

// Clean, solid corporate gradient colors
const solidGradients = [
    "linear-gradient(135deg, #1e3a8a, #3b82f6)", // A - Navy to Royal
    "linear-gradient(135deg, #4c1d95, #7c3aed)", // B - Deep Violet
    "linear-gradient(135deg, #7f1d1d, #dc2626)", // C - Classic Maroon Red
    "linear-gradient(135deg, #064e3b, #10b981)", // D - Deep Mint
    "linear-gradient(135deg, #7c2d12, #ea580c)", // E - Deep Orange
    "linear-gradient(135deg, #075985, #0ea5e9)", // F - Tech Azure
    "linear-gradient(135deg, #831843, #db2777)", // G - Deep Pink Accent
    "linear-gradient(135deg, #1e1b4b, #4338ca)", // H - Midnight Indigo
    "linear-gradient(135deg, #14532d, #16a34a)", // I - Emerald Green
    "linear-gradient(135deg, #78350f, #d97706)", // J - Warm Amber
    "linear-gradient(135deg, #581c87, #9333ea)", // K - Imperial Purple
    "linear-gradient(135deg, #134e4a, #0d9488)", // L - Clean Teal
    "linear-gradient(135deg, #9f1239, #f43f5e)", // M - Crimson Rose
    "linear-gradient(135deg, #2563eb, #60a5fa)", // N - Corporate Cobalt
    "linear-gradient(135deg, #3730a3, #6366f1)", // O - Periwinkle Iris
    "linear-gradient(135deg, #0f766e, #14b8a6)", // P - Aqua Cyan
    "linear-gradient(135deg, #92400e, #f59e0b)", // Q - Ochre Yellow
    "linear-gradient(135deg, #1f2937, #4b5563)"  // R - Balanced Charcoal Slate
];

const cardNames = {
    A:"Total Students Data", B:"HR Contact Details", C:"Training Programs",
    D:"Placed Data with Offers", E:"Capgemini", F:"Cognizant",
    G:"Enrollment Journey", H:"IBM", I:"Tech Mahindra",
    J:"HCL", K:"Oracle", L:"Amazon",
    M:"Google", N:"Microsoft", O:"KPIT",
    P:"Zoho", Q:"Hexaware", R:"Genpact"
};

const cardIcons = {
    A: '<i class="fa-solid fa-users"></i>', B: '<i class="fa-solid fa-address-book"></i>', C: '<i class="fa-solid fa-graduation-cap"></i>',
    D: '<i class="fa-solid fa-file-signature"></i>', E: '<i class="fa-solid fa-laptop-code"></i>', F: '<i class="fa-solid fa-network-wired"></i>',
    G: '<i class="fa-solid fa-route"></i>', H: '<i class="fa-solid fa-server"></i>', I: '<i class="fa-solid fa-gears"></i>',
    J: '<i class="fa-solid fa-terminal"></i>', K: '<i class="fa-solid fa-database"></i>', L: '<i class="fa-brands fa-amazon"></i>',
    M: '<i class="fa-brands fa-google"></i>', N: '<i class="fa-brands fa-microsoft"></i>', O: '<i class="fa-solid fa-car-battery"></i>',
    P: '<i class="fa-solid fa-box-open"></i>', Q: '<i class="fa-solid fa-cubes"></i>', R: '<i class="fa-solid fa-chart-line"></i>'
};

const container = document.getElementById("cardsContainer");

Object.keys(csvLinks).forEach((key, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.background = solidGradients[index];

    card.innerHTML = `${cardIcons[key]} <span>${cardNames[key]}</span>`;

    card.onclick = () => {
        if(key === "A"){
            localStorage.setItem("csvURL", csvLinks[key]);
            window.location.href = "2027-Total_Students_Data.html";
        }
        else if(key === "B"){ window.location.href = "HR_Contact_Details.html"; }
        else if(key === "C"){ window.location.href = "wipro.html"; }
        else if(key === "D"){ window.location.href = "Placed_Students_Data.html"; }
        else if(key === "E"){ window.location.href = "capgemini.html"; }
        else if(key === "F"){ window.location.href = "cognizant.html"; }
        else if(key === "G"){ window.location.href = "2027-Student_Enrollment_&_Selection_Journey.html"; }
        else if(key === "H"){ window.location.href = "ibm.html"; }
        else if(key === "I"){ window.location.href = "techmahindra.html"; }
        else if(key === "J"){ window.location.href = "hcl.html"; }
        else if(key === "K"){ window.location.href = "oracle.html"; }
        else if(key === "L"){ window.location.href = "amazon.html"; }
        else if(key === "M"){ window.location.href = "google.html"; }
        else if(key === "N"){ window.location.href = "microsoft.html"; }
        else if(key === "O"){ window.location.href = "kpit.html"; }
        else if(key === "P"){ window.location.href = "zoho.html"; }
        else if(key === "Q"){ window.location.href = "hexaware.html"; }
        else if(key === "R"){ window.location.href = "genpact.html"; }
    };

    container.appendChild(card);
});
</script>

</body>
</html>
