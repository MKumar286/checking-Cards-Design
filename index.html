<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026-2027</title>

<!-- Font Awesome for sleek corporate icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    margin: 0;
    padding: 40px 20px;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    /* Exactly matching the premium dark background gradient from Data 2.png */
    background: radial-gradient(circle at 50% 30%, #0b1a36 0%, #020714 100%);
    color: #ffffff;
    min-height: 100vh;
}

h1 {
    text-align: center;
    color: #ffffff;
    font-size: 2.2rem;
    margin-bottom: 5px;
    font-weight: 800;
    letter-spacing: -0.5px;
}

h2 {
    text-align: center;
    color: #3b82f6; /* Vibrant theme accent blue */
    font-size: 1.3rem;
    margin-top: 0;
    font-weight: 600;
}

h3 {
    text-align: center;
    color: #64748b;
    font-size: 1rem;
    margin-bottom: 45px;
    font-weight: 500;
}

/* Flexible container allowing cards to wrap while maintaining text-fit dynamic widths */
.cards-container {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    max-width: 1200px;
    margin: 0 auto;
}

/* Precise replication of the services card styling from Data 2.png */
.card {
    height: 54px;
    width: fit-content; /* Dynamically shrinks the card width tightly to text-fit length */
    background: rgba(9, 22, 46, 0.7); /* Translucent dark tint matching the image */
    border: 1px solid rgba(59, 130, 246, 0.35); /* Subtle glowing blue-tint outline line */
    border-radius: 27px; /* Perfect pill-shaped capsule edges */
    display: inline-flex;
    align-items: center;
    justify-content: flex-start;
    color: #ffffff; /* Crisp clean white text */
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    padding: 0 20px 0 8px; /* Tighter internal horizontal containment padding */
    box-sizing: border-box;
    white-space: nowrap; /* Prevents text from breaking or wrapping awkwardly */
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    transition: all 0.2s ease;
}

/* Circular Blue Icon Wrapper Badge from Data 2.png */
.card .icon-badge {
    width: 38px;
    height: 38px;
    background: #0062ff; /* High-intensity blue icon fill */
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
    flex-shrink: 0;
}

/* White vector icons inside the blue badge */
.card .icon-badge i {
    font-size: 16px;
    color: #ffffff;
}

.card span {
    letter-spacing: 0.2px;
}

/* Interactive hover response */
.card:hover {
    background: rgba(13, 31, 66, 0.9);
    border-color: #3b82f6; /* Accent highlight on hover */
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 98, 255, 0.2);
}

.card:active {
    transform: translateY(0);
}
</style>
</head>

<body>

<h1>Mahatma Gandhi Institute of Technology</h1>
<h2>Training and Placement Cell</h2>
<h3>Academic Year 2026-2027</h3>

<div class="cards-container" id="cardsContainer"></div>

<script>
const csvLinks = {
    A:"https://docs.google.com/spreadsheets/d/e/2PACX-1vT4Yx068ZzCU8j4ouN_73-tolfsyoAO0skZWsGSc_4oZbACSlNGtpBCfaGQkpZfWg/pub?gid=1507961296&single=true&output=csv",
    B:"", C:"", D:"", E:"", F:"", G:"", H:"", I:"", J:"", K:"", L:"", M:"", N:"", O:"", P:"", Q:"", R:""
};

const cardNames = {
    A:"Total Students Data", B:"HR Contact Details", C:"Training Programs",
    D:"Placed Data with Offers", E:"Capgemini", F:"Cognizant",
    G:"Enrollment Journey", H:"IBM", I:"Tech Mahindra",
    J:"HCL", K:"Oracle", L:"Amazon",
    M:"Google", N:"Microsoft", O:"KPIT",
    P:"Zoho", Q:"Hexaware", R:"Genpact"
};

const cardIcons = {
    A: '<i class="fa-solid fa-users"></i>', B: '<i class="fa-solid fa-address-book"></i>', C: '<i class="fa-solid fa-graduation-cap"></i>',
    D: '<i class="fa-solid fa-file-signature"></i>', E: '<i class="fa-solid fa-laptop-code"></i>', F: '<i class="fa-solid fa-network-wired"></i>',
    G: '<i class="fa-solid fa-route"></i>', H: '<i class="fa-solid fa-server"></i>', I: '<i class="fa-solid fa-gears"></i>',
    J: '<i class="fa-solid fa-terminal"></i>', K: '<i class="fa-solid fa-database"></i>', L: '<i class="fa-brands fa-amazon"></i>',
    M: '<i class="fa-brands fa-google"></i>', N: '<i class="fa-brands fa-microsoft"></i>', O: '<i class="fa-solid fa-car-battery"></i>',
    P: '<i class="fa-solid fa-box-open"></i>', Q: '<i class="fa-solid fa-cubes"></i>', R: '<i class="fa-solid fa-chart-line"></i>'
};

const container = document.getElementById("cardsContainer");

Object.keys(csvLinks).forEach((key) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `<div class="icon-badge">${cardIcons[key]}</div> <span>${cardNames[key]}</span>`;

    card.onclick = () => {
        if(key === "A"){
            localStorage.setItem("csvURL", csvLinks[key]);
            window.location.href = "2027-Total_Students_Data.html";
        }
        else if(key === "B"){ window.location.href = "HR_Contact_Details.html"; }
        else if(key === "C"){ window.location.href = "wipro.html"; }
        else if(key === "D"){ window.location.href = "Placed_Students_Data.html"; }
        else if(key === "E"){ window.location.href = "capgemini.html"; }
        else if(key === "F"){ window.location.href = "cognizant.html"; }
        else if(key === "G"){ window.location.href = "2027-Student_Enrollment_&_Selection_Journey.html"; }
        else if(key === "H"){ window.location.href = "ibm.html"; }
        else if(key === "I"){ window.location.href = "techmahindra.html"; }
        else if(key === "J"){ window.location.href = "hcl.html"; }
        else if(key === "K"){ window.location.href = "oracle.html"; }
        else if(key === "L"){ window.location.href = "amazon.html"; }
        else if(key === "M"){ window.location.href = "google.html"; }
        else if(key === "N"){ window.location.href = "microsoft.html"; }
        else if(key === "O"){ window.location.href = "kpit.html"; }
        else if(key === "P"){ window.location.href = "zoho.html"; }
        else if(key === "Q"){ window.location.href = "hexaware.html"; }
        else if(key === "R"){ window.location.href = "genpact.html"; }
    };

    container.appendChild(card);
});
</script>

</body>
</html>
